name: Periphery Dead Code Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  periphery:
    name: Periphery
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery scan
        # --strict re-enable once .periphery.yml retain entries cover confirmed false
        # positives (@Published, @ObservedObject, cross-target, design-system tokens).
        # Tracked in #805.
        run: periphery scan
