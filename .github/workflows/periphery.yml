name: Periphery Dead Code Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  periphery:
    name: Periphery
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Periphery v3
        run: |
          brew tap peripheryapp/periphery
          brew install peripheryapp/periphery/periphery@3
          brew link --overwrite peripheryapp/periphery/periphery@3

      - name: Run Periphery scan
        run: periphery scan --disable-update-check
