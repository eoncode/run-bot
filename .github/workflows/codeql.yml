name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2 toolchain
        run: |
          brew install swiftenv || true
          export SWIFTENV_ROOT="$HOME/.swiftenv"
          export PATH="$SWIFTENV_ROOT/bin:$SWIFTENV_ROOT/shims:$PATH"
          SWIFT_URL="https://download.swift.org/swift-6.2-release/xcode/swift-6.2-RELEASE/swift-6.2-RELEASE-osx.pkg"
          curl -L -o /tmp/swift.pkg "$SWIFT_URL"
          sudo installer -pkg /tmp/swift.pkg -target /
          TOOLCHAIN=$(find /Library/Developer/Toolchains -name '*.xctoolchain' -maxdepth 1 | head -1)
          echo "TOOLCHAINS=$(plutil -extract CFBundleIdentifier raw "$TOOLCHAIN/Info.plist")" >> "$GITHUB_ENV"
          echo "$(dirname $(xcrun --find swift))" >> "$GITHUB_PATH"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
