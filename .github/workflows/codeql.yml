name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'Package.swift'
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  analyze:
    name: CodeQL Analysis
    # Opt-in only: runs when commit message contains [run codeql],
    # on the weekly schedule, or via manual workflow_dispatch.
    # This prevents CodeQL from blocking the self-hosted runner on every push.
    #
    # Usage:
    #   git commit -m "fix: something [run codeql]"
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[run codeql]') ||
      contains(github.event.pull_request.head.commit.message, '[run codeql]')
    runs-on: macos-26
    permissions:
      actions: read
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CodeQL bundle
        uses: actions/cache@v4
        with:
          path: ~/.codeql/packages
          key: codeql-swift-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/codeql.yml') }}

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          # Key on Package.resolved so the cache is invalidated automatically
          # when any dependency version changes. Falls back to the most recent
          # cache for the same OS/arch so incremental compilation still works
          # even when the resolved file changes slightly.
          key: codeql-swiftbuild-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            codeql-swiftbuild-${{ runner.os }}-${{ runner.arch }}-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          # autobuild runs plain `swift build` without --arch arm64, which
          # fails on this arm64 runner because main.swift has an #error guard
          # that requires the arch to be set explicitly. Use manual mode and
          # mirror the same invocation used by build.sh.
          build-mode: manual

      - name: Build for CodeQL
        # Must match build.sh: release config, arm64 arch.
        # -c release: consistent with production build and avoids debug-only
        #   code paths that inflate the analysis surface.
        # --arch arm64: required — the #error guard in main.swift fires if the
        #   arch is not pinned, which is exactly what broke autobuild.
        run: swift build -c release --arch arm64

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
