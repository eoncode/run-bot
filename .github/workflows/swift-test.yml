name: Swift Test

on:
  pull_request:

jobs:
  test:
    name: Swift Test
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.0.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: swift test --filter RunnerBarCoreTests
