name: UI Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ui-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # --- Toolchain checks ---------------------------------------------------

      - name: Ensure Homebrew is available
        run: |
          if ! command -v brew &>/dev/null; then
            echo "Installing Homebrew..."
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          else
            echo "Homebrew already installed: $(brew --version)"
          fi

      - name: Install XcodeGen (if not cached)
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already installed: $(xcodegen --version)"
          fi

      - name: Set Xcode developer path
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Validate Xcode installation
        run: |
          XCODE_PATH=$(xcode-select -p)
          echo "Xcode developer path: $XCODE_PATH"
          if [[ "$XCODE_PATH" == *"CommandLineTools"* ]]; then
            echo "ERROR: xcode-select still points at CLT. Full Xcode.app required."
            exit 1
          fi
          xcodebuild -version

      # --- Build --------------------------------------------------------------

      - name: Generate ephemeral Xcode project
        run: xcodegen generate

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project RunnerBar.xcodeproj \
            -scheme RunnerBarUITests \
            -destination 'platform=macOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || xcodebuild test \
              -project RunnerBar.xcodeproj \
              -scheme RunnerBarUITests \
              -destination 'platform=macOS' \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
        env:
          UI_TESTING: "1"

      # --- Cleanup ------------------------------------------------------------

      - name: Remove generated Xcode project
        if: always()
        run: rm -rf RunnerBar.xcodeproj
